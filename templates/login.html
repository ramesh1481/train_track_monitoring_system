<!DOCTYPE html>
<html>
<head>
    <title>TrackCrack | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="login-wrap">
    <div class="card login-card">
        <h2>TrackCrack Portal</h2>
        <p class="muted">Sign in to monitor train track crack complaints</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            <input name="username" placeholder="Username" required><br><br>
            <input name="password" type="password" placeholder="Password" required><br><br>
            <button class="btn">Login</button>
        </form>

        <p class="hint">Default credentials: admin/admin123, supervisor/super123, inspector/inspect123</p>
    </div>
</div>

</body>
</html>
